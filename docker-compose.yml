version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: marginalia_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: marginalia
      POSTGRES_PASSWORD: marginalia
      POSTGRES_DB: marginalia_dev
    ports:
      - "5432:5432"
    volumes:
      - marginalia_pg_data:/var/lib/postgresql/data

volumes:
  marginalia_pg_data:
